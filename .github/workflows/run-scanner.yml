# Run the PQC scanner on a repo list (from "Build repo list" artifact).
# Each run can process a batch (e.g. 500 repos) within the 6h Actions limit.
# To continue, run again with "Resume from run ID" set to the previous scanner run.
# results/ and scanner/state.db are in .gitignore; never committed.

name: Run scanner (from list)

on:
  workflow_dispatch:
    inputs:
      repo_list_run_id:
        description: "Run ID of a completed 'Build repo list' run (Actions → Build repo list → copy run ID; not the scanner run)"
        required: true
        type: string
      limit:
        description: "Max repos to scan in this run (0 = no limit; 6h timeout applies)"
        required: false
        default: 500
        type: number
      resume_from_run_id:
        description: "Optional: Run ID of a previous 'Run scanner' run (to resume state)"
        required: false
        type: string
      verbose:
        description: "Verbose logging"
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows: ["Build repo list"]
    types: [completed]
    branches: [main, master]

env:
  GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max
    # When triggered by "Build repo list", only run if that workflow succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read   # required to download artifact from the "Build repo list" workflow run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get repo list run ID
        id: repo_list_run
        run: |
          if [ -n "${{ github.event.workflow_run.id }}" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ inputs.repo_list_run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate repo list run (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          RUN_ID: ${{ steps.repo_list_run.outputs.run_id }}
        run: |
          echo "Checking that run $RUN_ID is a 'Build repo list' run with artifact 'repo-list'..."
          WF=$(gh run view "$RUN_ID" --json name,workflowName 2>/dev/null || true)
          if [ -z "$WF" ]; then
            echo "::error::Run ID $RUN_ID not found or not accessible. Use the Run ID from Actions → 'Build repo list' (not from 'Run scanner')."
            exit 1
          fi
          NAME=$(echo "$WF" | jq -r '.workflowName // .name')
          if [ "$NAME" != "Build repo list" ]; then
            echo "::error::Run $RUN_ID is '$NAME', not 'Build repo list'. Use the Run ID from Actions → 'Build repo list'."
            exit 1
          fi
          ARTS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" --jq '.artifacts[].name' 2>/dev/null || true)
          if [ -z "$ARTS" ] || ! echo "$ARTS" | grep -qx "repo-list"; then
            echo "::error::Run $RUN_ID has no artifact named 'repo-list'. Run 'Build repo list' first and use that run's ID."
            exit 1
          fi
          echo "Run is valid."

      # Use gh run download (not actions/download-artifact) so cross-run download
      # works with default GITHUB_TOKEN; the action can only download current run's artifacts.
      - name: Download repo list
        env:
          RUN_ID: ${{ steps.repo_list_run.outputs.run_id }}
        run: |
          gh run download "$RUN_ID" -n repo-list -D . -R ${{ github.repository }}

      - name: Prepare repo list path
        run: |
          if [ -f repo-list/repo_list.jsonl ]; then
            cp repo-list/repo_list.jsonl repo_list.jsonl
          elif [ -f repo_list.jsonl ]; then
            true
          else
            echo "No repo_list.jsonl found"
            exit 1
          fi

      - name: Resume state (optional)
        if: ${{ inputs.resume_from_run_id != '' }}
        env:
          RESUME_RUN_ID: ${{ inputs.resume_from_run_id }}
        run: |
          mkdir -p scanner results
          echo "Downloading state and results from run $RESUME_RUN_ID ..."
          # Artifact "scanner-state" contains state.db at root; extract into scanner/ so scanner/state.db exists
          gh run download "$RESUME_RUN_ID" -n scanner-state -D scanner -R ${{ github.repository }}
          gh run download "$RESUME_RUN_ID" -n scanner-results -D results -R ${{ github.repository }} 2>/dev/null || true
          if [ -f scanner/state.db ]; then
            echo "Resuming from previous state"
          fi

      - name: Run scanner
        env:
          LIMIT: ${{ inputs.limit || 500 }}
        run: |
          python cli.py collect --from-file repo_list.jsonl --limit $LIMIT ${{ inputs.verbose && '--verbose' || '' }}

      - name: Upload scanner state
        uses: actions/upload-artifact@v4
        with:
          name: scanner-state
          path: scanner/state.db

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scanner-results
          path: results/
